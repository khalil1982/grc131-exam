// Anti-cheat
function aKey(n,p){return CFG.examId+"_"+p+"_"+n.replace(/\s/g,"_")}
function aGet(n,p){try{var d=localStorage.getItem(aKey(n,p));return d?JSON.parse(d):{c:0,s:[],ts:[]}}catch(e){return{c:0,s:[],ts:[]}}}
function aSave(n,p,sc){try{var d=aGet(n,p);d.c++;d.s.push(sc);d.ts.push(new Date().toISOString());localStorage.setItem(aKey(n,p),JSON.stringify(d))}catch(e){}}
function aBlocked(n,p){return aGet(n,p).c>=1}
// Reset student attempt
function aReset(n,p){try{localStorage.removeItem(aKey(n,p))}catch(e){}}

var S={pg:"start",sec:0,ans:{},nm:"",pr:"",sr:"",ld:false,sc:null,scs:null,st:null,el:"00:00:00",tid:null,ag:false,att:0};

// ★★★ BEHAVIOR TRACKING SYSTEM ★★★
var BHV={
  sectionVisits:[],        // [{section, enterTime, leaveTime}]
  sectionEnterTime:null,   // current section enter timestamp
  answerChanges:{},        // {"0-3": 2} = question 0-3 changed 2 times
  answerTimestamps:{},     // {"0-3": "2026-01-15T10:05:32"} first answer time
  navigationLog:[],        // [{from, to, time}]
  tabSwitches:0,           // how many times student left the tab
  focusLost:0,             // focus lost events
  totalClicks:0,           // total interaction clicks
  questionsSkipped:[],     // questions left blank at submit
  lastActivity:null,       // last interaction timestamp
  idlePeriods:[],          // [{start, end, duration}] idle > 30s
  idleStart:null,
  examStartTime:null,
  examEndTime:null,
  deviceInfo:"",
  screenSize:""
};

// Track tab visibility changes (potential cheating indicator)
document.addEventListener("visibilitychange",function(){
  if(S.pg==="exam"){
    if(document.hidden){BHV.tabSwitches++;BHV.navigationLog.push({event:"tab_hidden",time:new Date().toISOString()})}
    else{BHV.navigationLog.push({event:"tab_visible",time:new Date().toISOString()})}
  }
});
// Track focus loss
window.addEventListener("blur",function(){if(S.pg==="exam"){BHV.focusLost++;BHV.navigationLog.push({event:"focus_lost",time:new Date().toISOString()})}});
window.addEventListener("focus",function(){if(S.pg==="exam"){BHV.navigationLog.push({event:"focus_gained",time:new Date().toISOString()})}});
// Track idle periods
document.addEventListener("mousemove",function(){trackActivity()});
document.addEventListener("keydown",function(){trackActivity()});
document.addEventListener("click",function(){if(S.pg==="exam")BHV.totalClicks++; trackActivity()});

function trackActivity(){
  var now=Date.now();
  if(S.pg==="exam"){
    if(BHV.idleStart && (now-BHV.idleStart)>30000){
      BHV.idlePeriods.push({start:new Date(BHV.idleStart).toISOString(),end:new Date(now).toISOString(),durationSec:Math.round((now-BHV.idleStart)/1000)});
    }
    BHV.idleStart=now;
    BHV.lastActivity=new Date(now).toISOString();
  }
}

function trackSectionEnter(secIdx){
  BHV.sectionEnterTime=Date.now();
  BHV.navigationLog.push({event:"section_enter",section:secIdx+1,time:new Date().toISOString()});
}
function trackSectionLeave(secIdx){
  if(BHV.sectionEnterTime){
    var dur=Math.round((Date.now()-BHV.sectionEnterTime)/1000);
    BHV.sectionVisits.push({section:secIdx+1,durationSec:dur,time:new Date().toISOString()});
  }
}

// ★★★ BUILD COMPREHENSIVE JSON for AI Evaluation ★★★
function buildStudentJSON(){
  var sc=S.scs;
  var json={
    // ===== METADATA =====
    metadata:{
      examId:CFG.examId,
      examTitle:CFG.title,
      unit:CFG.unit,
      course:CFG.code,
      instructor:CFG.instructor,
      college:CFG.college,
      generatedAt:new Date().toISOString(),
      version:"1.0"
    },
    // ===== STUDENT INFO =====
    student:{
      name:S.nm,
      program:S.pr,
      programFull:S.pr==="BOM"?"Business Office Management":"Emergency Nursing",
      attemptNumber:S.att,
      penaltyApplied:S.att>1
    },
    // ===== TIMING =====
    timing:{
      startTime:BHV.examStartTime,
      endTime:new Date().toISOString(),
      totalDuration:S.el,
      totalDurationSec:S.st?Math.round((Date.now()-S.st)/1000):0,
      timeLimitMin:CFG.timeLimit,
      exceededTimeLimit:S.st?((Date.now()-S.st)/60000)>CFG.timeLimit:false
    },
    // ===== SCORES =====
    scores:{
      section1_MCQ:{earned:sc.s1,total:20,percentage:Math.round((sc.s1/20)*100)},
      section2_TrueFalse:{earned:sc.s2,total:15,percentage:Math.round((sc.s2/15)*100)},
      section3_FillBlanks:{earned:sc.s3,total:15,percentage:Math.round((sc.s3/15)*100)},
      section4_Matching:{earned:sc.s4,total:15,percentage:Math.round((sc.s4/15)*100)},
      autoGradedTotal:{earned:sc.tot,total:65,percentage:Math.round((sc.tot/65)*100)},
      manualGraded:{total:35,sections:"5 & 6"},
      examTotal:100
    },
    // ===== ANSWERS — Section by Section =====
    answers:{
      section1_MCQ:{},
      section2_TrueFalse:{},
      section3_FillBlanks:{},
      section4_Matching:{},
      section5_ShortAnswer:{},
      section6_Scenarios:{}
    },
    // ===== BEHAVIOR ANALYTICS =====
    behavior:{
      engagement:{
        totalClicks:BHV.totalClicks,
        tabSwitches:BHV.tabSwitches,
        focusLostEvents:BHV.focusLost,
        suspiciousActivity:BHV.tabSwitches>3?"HIGH":BHV.tabSwitches>1?"MEDIUM":"LOW",
        idlePeriods:BHV.idlePeriods,
        totalIdleTimeSec:BHV.idlePeriods.reduce(function(a,p){return a+p.durationSec},0)
      },
      sectionTimeSpent:{},
      answerChangeCount:{},
      navigationLog:BHV.navigationLog,
      questionsUnanswered:[],
      completionRate:0,
      deviceInfo:navigator.userAgent,
      screenSize:window.innerWidth+"x"+window.innerHeight
    }
  };

  // ===== Populate Section 1: MCQ answers =====
  SEC[0].qs.forEach(function(q,i){
    var ans=gA(0,i);
    var correct=q.c;
    json.answers.section1_MCQ["Q"+(i+1)]={
      question:q.q,
      studentAnswer:ans!==null?q.o[ans]:"(unanswered)",
      studentAnswerIndex:ans,
      correctAnswer:q.o[correct],
      correctAnswerIndex:correct,
      isCorrect:ans===correct,
      marksEarned:ans===correct?2:0,
      marksTotal:2
    };
  });

  // ===== Populate Section 2: T/F =====
  SEC[1].qs.forEach(function(q,i){
    var ans=gA(1,i);
    var isCorrect=ans!==null&&(ans==="true")===q.c;
    json.answers.section2_TrueFalse["Q"+(i+1)]={
      question:q.q,
      studentAnswer:ans===null?"(unanswered)":ans==="true"?"True":"False",
      correctAnswer:q.c?"True":"False",
      isCorrect:isCorrect,
      marksEarned:isCorrect?1.5:0,
      marksTotal:1.5
    };
  });

  // ===== Populate Section 3: Fill blanks =====
  SEC[2].qs.forEach(function(q,i){
    var ans=gA(2,i);
    json.answers.section3_FillBlanks["Q"+(i+1)]={
      question:q.q,
      studentAnswer:ans||"(unanswered)",
      correctAnswer:q.c,
      isCorrect:ans===q.c,
      marksEarned:ans===q.c?1.5:0,
      marksTotal:1.5
    };
  });

  // ===== Populate Section 4: Matching =====
  SEC[3].tr.forEach(function(term,i){
    var ans=gA(3,i);
    var correct=SEC[3].mp[i];
    var correctDesc=SEC[3].ds.find(function(d){return d.l===correct});
    var studentDesc=ans?SEC[3].ds.find(function(d){return d.l===ans}):null;
    json.answers.section4_Matching["Q"+(i+1)]={
      term:term,
      studentAnswer:ans||"(unanswered)",
      studentDescription:studentDesc?studentDesc.d:"(unanswered)",
      correctAnswer:correct,
      correctDescription:correctDesc?correctDesc.d:"",
      isCorrect:ans===correct,
      marksEarned:ans===correct?1.5:0,
      marksTotal:1.5
    };
  });

  // ===== Populate Section 5: Short Answer — question text as key, answer as value =====
  SEC[4].qs.forEach(function(q,i){
    var ans=gA(4,i)||"";
    json.answers.section5_ShortAnswer[q.q]=ans||"(unanswered)";
  });

  // ===== Populate Section 6: Scenarios — question text as key, answer as value =====
  SEC[5].scs.forEach(function(sc,si){
    json.answers.section6_Scenarios["Scenario"+(si+1)+"_"+sc.t]={};
    sc.qs.forEach(function(q,qi){
      var ans=gA(5,si+"-"+qi)||"";
      json.answers.section6_Scenarios["Scenario"+(si+1)+"_"+sc.t][q.q]=ans||"(unanswered)";
    });
  });

  // ===== Behavior: Section time spent =====
  var secTimes={};
  BHV.sectionVisits.forEach(function(v){
    if(!secTimes["Section"+v.section])secTimes["Section"+v.section]=0;
    secTimes["Section"+v.section]+=v.durationSec;
  });
  json.behavior.sectionTimeSpent=secTimes;

  // ===== Behavior: Answer changes =====
  json.behavior.answerChangeCount=BHV.answerChanges;

  // ===== Behavior: Unanswered questions =====
  var answered=0,total=0;
  SEC.forEach(function(s,si){
