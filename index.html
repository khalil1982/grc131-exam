const SECTIONS=[{title:"Section 1: Multiple Choice Questions",subtitle:"Choose the correct answer. (2 marks each)",marks:20,level:"Basic",type:"mcq",questions:[{q:"What does IT stand for?",opts:["Internet Technology","Information Technology","Internal Transfer","Integrated Telephony"],c:1},{q:"Which of the following is an example of hardware?",opts:["Microsoft Word","Windows Operating System","Keyboard","Google Chrome"],c:2},{q:"What is the main function of the CPU?",opts:["Store data permanently","Display information on screen","Perform calculations and execute instructions","Connect to the internet"],c:2},{q:"Which type of memory is volatile?",opts:["ROM","Hard Disk","RAM","USB Flash Drive"],c:2},{q:"Which is an output device?",opts:["Mouse","Scanner","Keyboard","Printer"],c:3},{q:"A network within the same building is called:",opts:["WAN","LAN","Internet","VoIP"],c:1},{q:"Which storage unit is largest?",opts:["Kilobyte","Megabyte","Gigabyte","Terabyte"],c:3},{q:"The three Vs of Big Data are:",opts:["Volume, Velocity, Variety","Virtual, Visual, Verified","Voice, Video, Value","Volume, Virus, Virtual"],c:0},{q:"Cloud computing best means:",opts:["Storing data only locally","Delivering services over the internet","Using only mainframes","A type of antivirus"],c:1},{q:"IoT stands for:",opts:["Integration of Technology","Internet of Things","Internal Operating Tool","Information on Transfer"],c:1}]},{title:"Section 2: True or False",subtitle:"Select True or False. (1.5 marks each)",marks:15,level:"Basic",type:"tf",questions:[{q:"Software refers to physical components.",c:false},{q:"The CPU is the brain of the computer.",c:true},{q:"ROM is volatile memory.",c:false},{q:"A scanner is an input device.",c:true},{q:"A byte = 4 bits.",c:false},{q:"The motherboard connects all components.",c:true},{q:"E-Commerce = buying/selling online.",c:true},{q:"An Intranet is open to the public.",c:false},{q:"RSI can be caused by prolonged keyboard use.",c:true},{q:"A mainframe is small and portable.",c:false}]},{title:"Section 3: Fill in the Blanks",subtitle:"Select the correct word. (1.5 marks each)",marks:15,level:"Intermediate",type:"dropdown",bank:["CPU","RAM","ROM","GUI","VoIP","LAN","WAN","Terabyte","Operating System","Ergonomics"],questions:[{q:"The ______ performs all calculations.",c:"CPU"},{q:"______ is temporary working memory.",c:"RAM"},{q:"A ______ connects devices across large distances.",c:"WAN"},{q:"______ reduces physical strain on users.",c:"Ergonomics"},{q:"The ______ manages hardware for applications.",c:"Operating System"},{q:"A ______ uses icons and menus.",c:"GUI"},{q:"______ contains permanent BIOS instructions.",c:"ROM"},{q:"A ______ connects computers in one building.",c:"LAN"},{q:"One ______ = ~1,000 Gigabytes.",c:"Terabyte"},{q:"______ enables internet voice calls.",c:"VoIP"}]},{title:"Section 4: Matching",subtitle:"Match term with description. (1.5 marks each)",marks:15,level:"Intermediate",type:"matching",terms:["Hard Disk Drive (HDD)","Artificial Intelligence (AI)","Scanner","Intranet","Monitor (VDU)","IoT","Firewall","Computer Virus","SSD","B2C"],descs:[{l:"A",t:"Translates documents into digital files"},{l:"B",t:"Primary permanent storage"},{l:"C",t:"Closed private network"},{l:"D",t:"Simulation of human intelligence"},{l:"E",t:"Objects connected via sensors/internet"},{l:"F",t:"Visual display unit"},{l:"G",t:"Harmful programs destroying data"},{l:"H",t:"Protects network from unauthorized access"},{l:"I",t:"Business-to-consumer e-commerce"},{l:"J",t:"No moving parts, faster than HDD"}],map:{0:"B",1:"D",2:"A",3:"C",4:"F",5:"E",6:"H",7:"G",8:"J",9:"I"}},{title:"Section 5: Short Answer Questions",subtitle:"Answer in 2-4 sentences each.",marks:20,level:"Advanced",type:"essay",questions:[{q:"Explain the difference between hardware and software. Give one example of each.",m:4},{q:"What is the difference between RAM and ROM? Mention two differences.",m:4},{q:"Describe the IPOS cycle with a real-world example.",m:4},{q:"List three health/safety precautions for computer use.",m:4},{q:"Define AI and give two real-world examples.",m:4}]},{title:"Section 6: Practical Scenarios",subtitle:"Read each scenario and answer.",marks:15,level:"Advanced",type:"scenario",scenarios:[{title:"Hospital Reception",text:"A hospital reception uses desktops for check-in, barcode scanners for wristband ID, and printers for appointment slips, connected through an internal network.",questions:[{q:"Identify TWO input devices and ONE output device.",m:3},{q:"What type of network (LAN/WAN)? Justify.",m:2}]},{title:"Business Office Security",text:"An accounting office found computers infected after an employee opened an unknown email attachment. No updated antivirus.",questions:[{q:"How did the virus likely infect the computers?",m:2},{q:"List THREE prevention steps.",m:3}]},{title:"Data vs Information",text:"A manager collects raw numbers: 120, 95, 200, 150, 88. After processing, the system shows revenue increased 15%.",questions:[{q:"What is DATA vs INFORMATION here? Explain.",m:3},{q:"Name ONE software and ONE output device for the report.",m:2}]}]}];

function getUsed(si){let u={};let sec=SECTIONS[si];let n=sec.type==="matching"?sec.terms.length:sec.type==="dropdown"?sec.questions.length:0;for(let i=0;i<n;i++){let v=getA(si,i);if(v)u[v]=true}return u}
function calcScores(){let s1=0,s2=0,s3=0,s4=0;SECTIONS[0].questions.forEach((q,i)=>{if(getA(0,i)===q.c)s1+=2});SECTIONS[1].questions.forEach((q,i)=>{let a=getA(1,i);if(a!==null&&(a==="true")===q.c)s2+=1.5});SECTIONS[2].questions.forEach((q,i)=>{if(getA(2,i)===q.c)s3+=1.5});SECTIONS[3].terms.forEach((_,i)=>{if(getA(3,i)===SECTIONS[3].map[i])s4+=1.5});return{s1,s2,s3,s4,total:s1+s2+s3+s4}}
function countAns(){let c=0,t=0;SECTIONS.forEach((s,si)=>{if(s.type==="mcq"||s.type==="tf"||s.type==="dropdown")s.questions.forEach((_,qi)=>{t++;if(getA(si,qi)!==null)c++});else if(s.type==="matching")s.terms.forEach((_,qi)=>{t++;if(getA(si,qi)!==null)c++});else if(s.type==="essay")s.questions.forEach((_,qi)=>{t++;if(getA(si,qi)&&getA(si,qi).trim())c++});else if(s.type==="scenario")s.scenarios.forEach((sc,sci)=>sc.questions.forEach((_,qi)=>{t++;if(getA(si,sci+"-"+qi)&&getA(si,sci+"-"+qi).trim())c++}))});return{c,t}}
function startTimer(){S.startTime=Date.now();S.timerId=setInterval(()=>{let d=Date.now()-S.startTime;let h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);S.elapsed=(h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);let el=document.getElementById("tt");if(el)el.textContent=S.elapsed;let td=document.getElementById("td");if(td){let mins=d/60000;td.className="timer-display"+(mins>=80?" timer-danger":mins>=60?" timer-warning":"")}},1000)}
function stopTimer(){if(S.timerId){clearInterval(S.timerId);S.timerId=null}}

async function submitExam(){
  stopTimer();
  let sc=calcScores();
  S.scores=sc;
  S.score=sc.total;

  let ea=SECTIONS[4].questions.map((_,qi)=>getA(4,qi)||"");
  let sa=[];
  SECTIONS[5].scenarios.forEach((c,ci)=>c.questions.forEach((_,qi)=>sa.push(getA(5,ci+"-"+qi)||"")));

  if(WEBAPP_URL&&WEBAPP_URL!=="PASTE_YOUR_WEBAPP_URL_HERE"){
    S.loading=true;
    render();

    try{
      let payload={
        studentName:S.name,
        program:S.prog,
        sectionScores:sc,
        essayAnswers:ea,
        scenarioAnswers:sa,
        allAnswers:S.ans,
        duration:S.elapsed
      };

      await fetch(WEBAPP_URL,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify(payload)
      });

      await new Promise(r=>setTimeout(r,2000));
    }catch(e){
      console.log("Send error:",e);
    }

    S.loading=false;
  }

  S.page="result";
  render();
  window.scrollTo(0,0);
}

function handleText(el){let si=+el.dataset.si,qi=el.dataset.qi;let qp=isNaN(+qi)?qi:(qi.includes("-")?qi:+qi);setA(si,qp,el.value,true);let card=el.closest('.q-card');if(card){if(el.value.trim())card.classList.add('answered');else card.classList.remove('answered')}}
function pickName(i){let sts=S.prog==="BOM"?BOM_STUDENTS:EN_STUDENTS;let f=sts.filter(s=>s.includes(S.search));S.name=f[i];render()}
function goSec(i){if(i>=0&&i<SECTIONS.length){S.sec=i;render();window.scrollTo(0,0)}}

function render(){
let app=document.getElementById("app");
let ll=document.getElementById("ll");
if(S.loading){if(ll)ll.classList.remove("hidden");return}else{if(ll)ll.classList.add("hidden")}
if(S.page==="start")return rStart(app);
if(S.page==="result")return rResult(app);
rExam(app);
}

function rStart(app){
let sts=S.prog==="BOM"?BOM_STUDENTS:S.prog==="EN"?EN_STUDENTS:[];
let f=sts.filter(s=>s.includes(S.search));
let nl="";
if(S.prog){
let items=f.length===0?'<div style="padding:20px;text-align:center;color:#9ca3af;direction:rtl">لا توجد نتائج</div>':f.map((n,i)=>{let sel=S.name===n;let idx=sts.indexOf(n)+1;return'<div class="name-item'+(sel?' selected':'')+'" onclick="pickName('+i+')"><div class="name-num">'+(sel?"✓":idx)+'</div><span>'+n+'</span></div>'}).join("");
nl='<div style="margin-bottom:20px"><div class="label">Step 2: Select your name / اختر اسمك</div><div class="search-box"><input id="ns" value="'+S.search+'" oninput="S.search=this.value;S.name=\'\';render()" placeholder="ابحث عن اسمك..."><span class="search-icon">🔍</span></div><div class="name-list">'+items+'</div><div style="font-size:11px;color:#9ca3af;margin-top:6px;text-align:right;direction:rtl">إجمالي: '+sts.length+' | نتائج: '+f.length+'</div></div>'}
let cf=S.name?'<div class="confirmed"><div class="check">✓</div><div><div style="font-size:15px;font-weight:700;color:#166534">'+S.name+'</div><div style="font-size:12px;color:#4ade80">'+(S.prog==="BOM"?"Business Office Management":"Emergency Nursing")+'</div></div></div>':"";
app.innerHTML='<div class="start-page"><div class="start-card"><div class="start-header"><div class="college">UNRWA — Khan Younis Training College</div><h1>Introduction to Computer Skills</h1><div class="sub">GRC131 — Comprehensive Exam</div><div class="sub2">Unit 1: Basic Concepts of IT</div><div class="sub2">Instructor: Khalil El Halabi</div></div><div class="start-body"><div class="instructions"><strong>Exam Instructions / تعليمات:</strong><br>• 100 marks — 6 sections — 90 min<br>• Sections 1–4: Auto-graded<br>• Sections 5–6: Manual grading<br>• ⏱ Timer starts on "Start Exam"</div><div class="label">Step 1: Select program / اختر تخصصك</div><div class="program-btns"><div class="program-btn'+(S.prog==="BOM"?" active":"")+'" onclick="S.prog=\'BOM\';S.name=\'\';S.search=\'\';render()"><div class="pname">BOM</div><div class="desc">Business Office Management</div><div style="font-size:10px;color:#aaa;margin-top:2px">'+BOM_STUDENTS.length+' students</div></div><div class="program-btn'+(S.prog==="EN"?" active":"")+'" onclick="S.prog=\'EN\';S.name=\'\';S.search=\'\';render()"><div class="pname">EN</div><div class="desc">Emergency Nursing</div><div style="font-size:10px;color:#aaa;margin-top:2px">'+EN_STUDENTS.length+' students</div></div></div>'+nl+cf+'<button class="start-btn" '+(S.name&&S.prog?'onclick="S.page=\'exam\';startTimer();render();window.scrollTo(0,0)"':'disabled')+'>Start Exam — ابدأ الامتحان →</button></div></div></div>'
}

function rExam(app){
let sec=SECTIONS[S.sec],{c,t}=countAns(),pct=Math.round((c/t)*100);
let lc={Basic:"#22c55e",Intermediate:"#f59e0b",Advanced:"#ef4444"}[sec.level];
let sn=SECTIONS.map((s,i)=>'<button class="secnav-btn'+(S.sec===i?' active':'')+'" onclick="goSec('+i+')">'+(i+1)+'</button>').join("");
let ct="";
if(sec.type==="mcq"){ct=sec.questions.map((q,qi)=>{let a=getA(S.sec,qi);return'<div class="q-card'+(a!==null?' answered':'')+'"><div class="q-title"><span class="num">Q'+(qi+1)+'.</span>'+q.q+'</div>'+q.opts.map((o,oi)=>'<div class="option'+(a===oi?' selected':'')+'" onclick="setA('+S.sec+','+qi+','+oi+')"><div class="radio"></div><span>'+String.fromCharCode(97+oi)+') '+o+'</span></div>').join("")+'</div>'}).join("")}
else if(sec.type==="tf"){ct=sec.questions.map((q,qi)=>{let a=getA(S.sec,qi);return'<div class="q-card'+(a!==null?' answered':'')+'"><div class="q-title"><span class="num">Q'+(qi+1)+'.</span>'+q.q+'</div><div class="tf-btns"><button class="tf-btn'+(a==="true"?' selected':'')+'" onclick="setA('+S.sec+','+qi+',\'true\')">✓ True</button><button class="tf-btn'+(a==="false"?' selected':'')+'" onclick="setA('+S.sec+','+qi+',\'false\')">✗ False</button></div></div>'}).join("")}
else if(sec.type==="dropdown"){let u=getUsed(S.sec);ct='<div class="word-bank"><strong>Word Bank:</strong> '+sec.bank.map(w=>'<span style="'+(u[w]?'text-decoration:line-through;color:#9ca3af':'')+'">'+w+'</span>').join(" • ")+'</div>';ct+=sec.questions.map((q,qi)=>{let a=getA(S.sec,qi)||"";let opts=sec.bank.map(w=>{let uo=false;for(let i=0;i<sec.questions.length;i++){if(i!==qi&&getA(S.sec,i)===w){uo=true;break}}return'<option value="'+w+'" '+(a===w?'selected':'')+(uo?' style="color:#9ca3af"':'')+'>'+w+(uo?' ✗':'')+'</option>'}).join("");return'<div class="q-card'+(a?' answered':'')+'"><div class="q-title"><span class="num">Q'+(qi+1)+'.</span>'+q.q+'</div><select onchange="setA('+S.sec+','+qi+',this.value||null)"><option value="">-- Select --</option>'+opts+'</select></div>'}).join("")}
else if(sec.type==="matching"){let u=getUsed(S.sec);ct='<div class="desc-bank"><strong>Descriptions:</strong>'+sec.descs.map(d=>'<div style="'+(u[d.l]?'text-decoration:line-through;color:#9ca3af':'')+'"><strong>'+d.l+'.</strong> '+d.t+(u[d.l]?' <span class="used-tag">USED</span>':'')+'</div>').join("")+'</div>';ct+=sec.terms.map((term,qi)=>{let a=getA(S.sec,qi)||"";let opts=sec.descs.map(d=>{let uo=false;for(let i=0;i<sec.terms.length;i++){if(i!==qi&&getA(S.sec,i)===d.l){uo=true;break}}return'<option value="'+d.l+'" '+(a===d.l?'selected':'')+(uo?' style="color:#9ca3af"':'')+'>'+d.l+(uo?' ✗':'')+'</option>'}).join("");return'<div class="match-row'+(a?' answered':'')+'"><span style="font-size:13px;font-weight:600">'+(qi+1)+'. '+term+'</span><select onchange="setA('+S.sec+','+qi+',this.value||null)"><option value="">--</option>'+opts+'</select></div>'}).join("")}
else if(sec.type==="essay"){ct=sec.questions.map((q,qi)=>{let a=getA(S.sec,qi)||"";return'<div class="q-card'+(a.trim()?' answered':'')+'"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px"><div class="q-title" style="margin:0;flex:1"><span class="num">Q'+(qi+1)+'.</span>'+q.q+'</div><span style="font-size:11px;color:#9ca3af">'+q.m+' marks</span></div><textarea rows="4" placeholder="Type your answer here..." data-si="'+S.sec+'" data-qi="'+qi+'" oninput="handleText(this)">'+a+'</textarea></div>'}).join("")}
else if(sec.type==="scenario"){ct=sec.scenarios.map((sc,sci)=>{let qs=sc.questions.map((q,qi)=>{let a=getA(S.sec,sci+"-"+qi)||"";return'<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:6px"><p style="font-size:13px;font-weight:600">'+String.fromCharCode(97+qi)+') '+q.q+'</p><span style="font-size:11px;color:#9ca3af">'+q.m+' marks</span></div><textarea rows="3" placeholder="Type your answer..." data-si="'+S.sec+'" data-qi="'+sci+'-'+qi+'" oninput="handleText(this)">'+a+'</textarea></div>'}).join("");return'<div class="scenario-box"><h3>Scenario '+(sci+1)+': '+sc.title+'</h3><div class="scenario-text">'+sc.text+'</div>'+qs+'</div>'}).join("")}
let nav='<div class="nav-btns"><button class="nav-btn prev-btn" '+(S.sec===0?'disabled':'')+' onclick="goSec('+(S.sec-1)+')">← Previous</button>'+(S.sec<SECTIONS.length-1?'<button class="nav-btn next-btn" onclick="goSec('+(S.sec+1)+')">Next →</button>':'<button class="nav-btn submit-btn" onclick="if(confirm(\'Submit exam?\\nتسليم الامتحان؟\'))submitExam()">✓ Submit — تسليم</button>')+'</div>';
app.innerHTML='<div class="topbar"><div class="topbar-inner"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700;color:var(--blue)">GRC131</span><span class="badge '+S.prog.toLowerCase()+'">'+S.prog+'</span><span style="font-size:12px;color:var(--gray);direction:rtl">'+S.name+'</span></div><div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gray)"><span>'+c+'/'+t+'</span><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div></div></div><div class="timer-bar"><div class="timer-display" id="td"><span style="font-size:16px">⏱</span><span class="timer-time" id="tt">'+S.elapsed+'</span><span style="font-size:10px;color:var(--gray)">Elapsed</span></div></div><div class="secnav"><div class="secnav-inner">'+sn+'</div></div><div class="container"><div class="sec-header" style="border-top:4px solid '+lc+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px"><div><h2 style="font-size:18px">'+sec.title+'</h2><p style="font-size:13px;color:var(--gray);margin-top:5px">'+sec.subtitle+'</p></div><div style="display:flex;gap:6px"><span class="tag" style="background:'+lc+'20;color:'+lc+'">'+sec.level+'</span><span class="tag" style="background:#f0f0f0;color:#555">'+sec.marks+' marks</span></div></div></div>'+ct+nav+'</div>'
}

function rResult(app){
let s=S.scores,am=65,pct=Math.round((S.score/am)*100);
let g=pct>=80?"Excellent":pct>=60?"Good":pct>=40?"Needs Improvement":"Below Expectations";
let gb=pct>=80?"#dcfce7":pct>=60?"#fef9c3":"#fee2e2";
let gc=pct>=80?"#166534":pct>=60?"#854d0e":"#991b1b";
app.innerHTML='<div class="result-page"><div class="result-card"><div class="result-header"><div style="font-size:48px;margin-bottom:8px">✓</div><h2 style="font-size:22px">Exam Submitted!</h2><h3 style="margin:8px 0 0;font-size:17px;direction:rtl">'+S.name+'</h3><p style="opacity:0.7;margin:4px 0 0;font-size:13px">'+(S.prog==="BOM"?"Business Office Management":"Emergency Nursing")+'</p></div><div class="result-body"><div class="time-result"><div style="font-size:12px;color:var(--gray);margin-bottom:4px">⏱ Time Taken / الوقت المستغرق</div><div class="t">'+S.elapsed+'</div></div><div style="text-align:center;margin-bottom:24px"><div class="big-score">'+S.score+'<span>/'+am+'</span></div><div style="font-size:14px;color:#6b7280">Auto-Graded (Sections 1–4)</div><div style="margin-top:12px"><span class="grade-badge" style="background:'+gb+';color:'+gc+'">'+g+' — '+pct+'%</span></div></div><div class="breakdown"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Breakdown:</div><div class="breakdown-row"><span>Multiple Choice</span><span style="font-weight:700;color:var(--blue)">'+s.s1+'/20</span></div><div class="breakdown-row"><span>True/False</span><span style="font-weight:700;color:var(--blue)">'+s.s2+'/15</span></div><div class="breakdown-row"><span>Fill in Blanks</span><span style="font-weight:700;color:var(--blue)">'+s.s3+'/15</span></div><div class="breakdown-row" style="border:none"><span>Matching</span><span style="font-weight:700;color:var(--blue)">'+s.s4+'/15</span></div></div><div class="note-box"><strong>ملاحظة:</strong> القسم 5 و 6 (35 درجة) تحتاج تصحيح يدوي. الدرجة النهائية ستُحدّث بعد المراجعة.</div></div></div></div>'
}
</script>
<div id="app"></div>
<div id="ll" class="loading-overlay hidden"><div class="loading-box"><div class="spinner"></div><div style="font-size:15px;font-weight:600">Submitting...</div><div style="font-size:13px;color:#6b7280;direction:rtl">جاري التسليم...</div></div></div>
<script>render()</script>
</body>
</html>
