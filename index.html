  .start-btn { width: 100%; padding: 14px 0; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px; }

  .count-info { font-size: 11px; color: #9ca3af; margin-top: 6px; text-align: right; direction: rtl; }

      { title:"Business Office Security", text:"An accounting office found computers infected with a virus after an employee opened an unknown email attachment. No updated antivirus software.",
        questions:[{q:"Explain how the virus likely infected the computers.",m:2},{q:"List THREE steps to prevent future virus attacks.",m:3}]},
      { title:"Data vs Information", text:"A manager collects raw numbers: 120, 95, 200, 150, 88. After processing, the system shows total revenue increased by 15%.",
        questions:[{q:"What represents DATA and what represents INFORMATION? Explain.",m:3},{q:"Name ONE software and ONE output device to present the report.",m:2}]}
    ]}
];

// ===== APP STATE =====
let state = { page:"start", section:0, answers:{}, name:"", program:"", search:"", loading:false, score:null, sectionScores:null };

function getA(si, qi) { return state.answers[si+"-"+qi] ?? null; }
function setA(si, qi, v) { state.answers[si+"-"+qi] = v; render(); }

function calcScores() {
  let s1=0,s2=0,s3=0,s4=0;
  SECTIONS[0].questions.forEach((q,i) => { if(getA(0,i)===q.c) s1+=2; });
  SECTIONS[1].questions.forEach((q,i) => { let a=getA(1,i); if(a!==null && (a==="true")===q.c) s2+=1.5; });
  SECTIONS[2].questions.forEach((q,i) => { if(getA(2,i)===q.c) s3+=1.5; });
  SECTIONS[3].terms.forEach((_,i) => { if(getA(3,i)===SECTIONS[3].map[i]) s4+=1.5; });
  return {s1,s2,s3,s4,total:s1+s2+s3+s4};
}

function countAnswered() {
  let c=0,t=0;
  SECTIONS.forEach((s,si) => {
    if(s.type==="mcq"||s.type==="tf"||s.type==="dropdown") s.questions.forEach((_,qi)=>{t++;if(getA(si,qi)!==null)c++;});
    else if(s.type==="matching") s.terms.forEach((_,qi)=>{t++;if(getA(si,qi)!==null)c++;});
    else if(s.type==="essay") s.questions.forEach((_,qi)=>{t++;if(getA(si,qi)&&getA(si,qi).trim())c++;});
    else if(s.type==="scenario") s.scenarios.forEach((sc,sci)=>sc.questions.forEach((_,qi)=>{t++;if(getA(si,sci+"-"+qi)&&getA(si,sci+"-"+qi).trim())c++;}));
  });
  return {c,t};
}

async function submitExam() {
  let scores = calcScores();
  state.sectionScores = scores;
  state.score = scores.total;
  
  // Collect essay answers
  let essayAnswers = SECTIONS[4].questions.map((_,qi) => getA(4,qi) || "");
  let scenarioAnswers = [];
  SECTIONS[5].scenarios.forEach((sc,sci) => sc.questions.forEach((_,qi) => scenarioAnswers.push(getA(5,sci+"-"+qi) || "")));
  
  // Try to send to Google Sheets
  if (WEBAPP_URL && WEBAPP_URL !== "PASTE_YOUR_WEBAPP_URL_HERE") {
    state.loading = true;
    render();
    try {
      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          studentName: state.name,
          program: state.program,
          sectionScores: scores,
          essayAnswers: essayAnswers,
          scenarioAnswers: scenarioAnswers,
          allAnswers: state.answers
        })
      });
    } catch(e) { console.log("Could not send to sheets:", e); }
    state.loading = false;
  }
  
  state.page = "result";
  render();
  window.scrollTo(0,0);
}

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");
  
  if (state.loading) {
    app.innerHTML = `<div class="loading-overlay"><div class="loading-box"><div class="spinner"></div><div style="font-size:15px;font-weight:600;color:#1f2937">Submitting exam...</div><div style="font-size:13px;color:#6b7280;margin-top:4px;direction:rtl">جاري تسليم الامتحان...</div></div></div>` + app.innerHTML;
    return;
  }
  
  if (state.page === "start") return renderStart(app);
  if (state.page === "result") return renderResult(app);
  renderExam(app);
}

function renderStart(app) {
  let students = state.program==="BOM" ? BOM_STUDENTS : state.program==="EN" ? EN_STUDENTS : [];
  let filtered = students.filter(s => s.includes(state.search));
  
  let nameListHTML = "";
  if (state.program) {
    let namesHTML = filtered.length === 0 
      ? '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:14px;direction:rtl">لا توجد نتائج مطابقة</div>'
      : filtered.map((n,i) => {
          let sel = state.name === n;
          let idx = students.indexOf(n)+1;
          return `<div class="name-item ${sel?'selected':''}" onclick="selectName('${n.replace(/'/g,"\\'")}')"><div class="name-num">${sel?'✓':idx}</div><span>${n}</span></div>`;
        }).join("");
    
    nameListHTML = `
      <div class="fade-in" style="margin-bottom:20px">
        <div class="label">Step 2: Select your name / اختر اسمك</div>
        <div class="search-box"><input value="${state.search}" oninput="updateSearch(this.value)" placeholder="ابحث عن اسمك هنا..."><span class="icon">🔍</span></div>
        <div class="name-list">${namesHTML}</div>
        <div class="count-info">إجمالي الطلاب: ${students.length} | نتائج البحث: ${filtered.length}</div>
      </div>`;
  }
  
  let confirmHTML = state.name ? `
    <div class="confirmed">
      <div class="check">✓</div>
      <div><div style="font-size:15px;font-weight:700;color:#166534">${state.name}</div>
      <div style="font-size:12px;color:#4ade80">${state.program==="BOM"?"Business Office Management":"Emergency Nursing"}</div></div>
    </div>` : "";
  
  app.innerHTML = `
    <div class="start-page">
      <div class="start-card">
        <div class="start-header">
          <div class="college">UNRWA — Khan Younis Training College</div>
          <h1>Introduction to Computer Skills</h1>
          <div class="sub">GRC131 — Comprehensive Exam</div>
          <div class="sub2">Unit 1: Basic Concepts of Information Technology</div>
          <div class="sub2">Instructor: Khalil El Halabi</div>
        </div>
        <div class="start-body">
          <div class="instructions">
            <strong>Exam Instructions / تعليمات الامتحان:</strong><br>
            • Total: 100 marks — 6 sections — 90 minutes<br>
            • Sections 1–4: Auto-graded | Sections 5–6: Manual grading
          </div>
          <div class="label">Step 1: Select your program / اختر تخصصك</div>
          <div class="program-btns">
            <div class="program-btn ${state.program==='BOM'?'active':''}" onclick="selectProgram('BOM')">
              <div class="name">BOM</div><div class="desc">Business Office Management</div>
              <div style="font-size:10px;color:#aaa;margin-top:2px">${BOM_STUDENTS.length} students</div>
            </div>
            <div class="program-btn ${state.program==='EN'?'active':''}" onclick="selectProgram('EN')">
              <div class="name">EN</div><div class="desc">Emergency Nursing</div>
              <div style="font-size:10px;color:#aaa;margin-top:2px">${EN_STUDENTS.length} students</div>
            </div>
          </div>
          ${nameListHTML}
          ${confirmHTML}
          <button class="start-btn" ${state.name&&state.program?'onclick="startExam()"':'disabled'}>Start Exam — ابدأ الامتحان →</button>
        </div>
      </div>
    </div>`;
}

function renderExam(app) {
  let sec = SECTIONS[state.section];
  let {c,t} = countAnswered();
  let pct = Math.round((c/t)*100);
  let levelColors = {Basic:"#22c55e",Intermediate:"#f59e0b",Advanced:"#ef4444"};
  let lc = levelColors[sec.level];
  
  let secNavHTML = SECTIONS.map((s,i) => `<button class="secnav-btn ${state.section===i?'active':''}" onclick="goSection(${i})">${i+1}</button>`).join("");
  
  let contentHTML = "";
  
  if (sec.type === "mcq") {
    contentHTML = sec.questions.map((q,qi) => {
      let ans = getA(state.section,qi);
      let optsHTML = q.opts.map((o,oi) => `<div class="option ${ans===oi?'selected':''}" onclick="setA(${state.section},${qi},${oi})"><div class="radio"></div><span>${String.fromCharCode(97+oi)}) ${o}</span></div>`).join("");
      return `<div class="q-card ${ans!==null?'answered':''}"><div class="q-title"><span class="num">Q${qi+1}.</span>${q.q}</div>${optsHTML}</div>`;
    }).join("");
  }
  
  else if (sec.type === "tf") {
    contentHTML = sec.questions.map((q,qi) => {
      let ans = getA(state.section,qi);
      return `<div class="q-card ${ans!==null?'answered':''}"><div class="q-title"><span class="num">Q${qi+1}.</span>${q.q}</div>
        <div class="tf-btns"><button class="tf-btn ${ans==='true'?'selected':''}" onclick="setA(${state.section},${qi},'true')">✓ True</button>
        <button class="tf-btn ${ans==='false'?'selected':''}" onclick="setA(${state.section},${qi},'false')">✗ False</button></div></div>`;
    }).join("");
  }
  
  else if (sec.type === "dropdown") {
    let bankHTML = `<div class="word-bank"><strong>Word Bank:</strong> ${sec.bank.join("  •  ")}</div>`;
    contentHTML = bankHTML + sec.questions.map((q,qi) => {
      let ans = getA(state.section,qi) || "";
      let opts = sec.bank.map(w => `<option value="${w}" ${ans===w?'selected':''}>${w}</option>`).join("");
      return `<div class="q-card ${ans?'answered':''}"><div class="q-title"><span class="num">Q${qi+1}.</span>${q.q}</div>
        <select onchange="setA(${state.section},${qi},this.value||null)"><option value="">-- Select Answer --</option>${opts}</select></div>`;
    }).join("");
  }
  
  else if (sec.type === "matching") {
    let descHTML = `<div class="desc-bank"><strong>Descriptions:</strong>${sec.descs.map(d=>`<div><strong>${d.l}.</strong> ${d.t}</div>`).join("")}</div>`;
    let opts = sec.descs.map(d => `<option value="${d.l}">${d.l}</option>`).join("");
    contentHTML = descHTML + sec.terms.map((term,qi) => {
      let ans = getA(state.section,qi) || "";
      let selOpts = sec.descs.map(d => `<option value="${d.l}" ${ans===d.l?'selected':''}>${d.l}</option>`).join("");
      return `<div class="match-row ${ans?'answered':''}"><span style="font-size:13px;font-weight:600">${qi+1}. ${term}</span>
        <select onchange="setA(${state.section},${qi},this.value||null)"><option value="">--</option>${selOpts}</select></div>`;
    }).join("");
  }
  
  else if (sec.type === "essay") {
    contentHTML = sec.questions.map((q,qi) => {
      let ans = getA(state.section,qi) || "";
      return `<div class="q-card ${ans.trim()?'answered':''}">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px">
          <div class="q-title" style="margin:0;flex:1"><span class="num">Q${qi+1}.</span>${q.q}</div>
          <span style="font-size:11px;color:#9ca3af">${q.m} marks</span></div>
        <textarea rows="4" placeholder="Type your answer here..." oninput="setA(${state.section},${qi},this.value)">${ans}</textarea></div>`;
    }).join("");
  }
  
  else if (sec.type === "scenario") {
    contentHTML = sec.scenarios.map((sc,sci) => {
      let qsHTML = sc.questions.map((q,qi) => {
        let ans = getA(state.section, sci+"-"+qi) || "";
        return `<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:6px">
            <p style="font-size:13px;font-weight:600">${String.fromCharCode(97+qi)}) ${q.q}</p>
            <span style="font-size:11px;color:#9ca3af">${q.m} marks</span></div>
          <textarea rows="3" placeholder="Type your answer here..." oninput="setA(${state.section},'${sci}-${qi}',this.value)">${ans}</textarea></div>`;
      }).join("");
      return `<div class="scenario-box"><h3>Scenario ${sci+1}: ${sc.title}</h3><div class="scenario-text">${sc.text}</div>${qsHTML}</div>`;
    }).join("");
  }
  
  let navHTML = `<div class="nav-btns">
    <button class="nav-btn prev-btn" ${state.section===0?'disabled':''} onclick="goSection(${state.section-1})">← Previous</button>
    ${state.section < SECTIONS.length-1 
      ? `<button class="nav-btn next-btn" onclick="goSection(${state.section+1})">Next →</button>`
      : `<button class="nav-btn submit-btn" onclick="confirmSubmit()">✓ Submit — تسليم</button>`}
  </div>`;
  
  app.innerHTML = `
    <div class="topbar"><div class="topbar-inner">
      <div class="topbar-left"><span class="code">GRC131</span><span class="badge ${state.program.toLowerCase()}">${state.program}</span><span class="sname">${state.name}</span></div>
      <div class="topbar-right"><span>${c}/${t}</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    </div></div>
    <div class="secnav"><div class="secnav-inner">${secNavHTML}</div></div>
    <div class="container">
      <div class="sec-header" style="border-top:4px solid ${lc}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div><h2>${sec.title}</h2><p class="sub">${sec.subtitle}</p></div>
          <div class="sec-tags"><span class="tag" style="background:${lc}20;color:${lc}">${sec.level}</span><span class="tag" style="background:#f0f0f0;color:#555">${sec.marks} marks</span></div>
        </div>
      </div>
      ${contentHTML}
      ${navHTML}
    </div>`;
}

function renderResult(app) {
  let s = state.sectionScores;
  let autoMax = 65;
  let pct = Math.round((state.score/autoMax)*100);
  let grade = pct>=80?"Excellent":pct>=60?"Good":pct>=40?"Needs Improvement":"Below Expectations";
  let gradeBg = pct>=80?"#dcfce7":pct>=60?"#fef9c3":"#fee2e2";
  let gradeColor = pct>=80?"#166534":pct>=60?"#854d0e":"#991b1b";
  
  app.innerHTML = `
    <div class="result-page"><div class="result-card">
      <div class="result-header">
        <div style="font-size:48px;margin-bottom:8px">✓</div>
        <h2 style="font-size:22px">Exam Submitted Successfully!</h2>
        <h3 style="margin:8px 0 0;font-size:17px;direction:rtl">${state.name}</h3>
        <p style="opacity:0.7;margin:4px 0 0;font-size:13px">${state.program==="BOM"?"Business Office Management":"Emergency Nursing"}</p>
      </div>
      <div class="result-body">
        <div style="text-align:center;margin-bottom:24px">
          <div class="big-score">${state.score}<span>/${autoMax}</span></div>
          <div style="font-size:14px;color:#6b7280">Auto-Graded Score (Sections 1–4)</div>
          <div style="margin-top:12px"><span class="grade-badge" style="background:${gradeBg};color:${gradeColor}">${grade} — ${pct}%</span></div>
        </div>
        <div class="breakdown">
          <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">Score Breakdown:</div>
          <div class="breakdown-row"><span>Multiple Choice</span><span style="font-weight:700;color:var(--blue)">${s.s1}/20</span></div>
          <div class="breakdown-row"><span>True or False</span><span style="font-weight:700;color:var(--blue)">${s.s2}/15</span></div>
          <div class="breakdown-row"><span>Fill in the Blanks</span><span style="font-weight:700;color:var(--blue)">${s.s3}/15</span></div>
          <div class="breakdown-row" style="border:none"><span>Matching</span><span style="font-weight:700;color:var(--blue)">${s.s4}/15</span></div>
        </div>
        <div class="note-box"><strong>ملاحظة:</strong> القسم 5 و 6 (35 درجة) تحتاج تصحيح يدوي من المدرّس. الدرجة النهائية ستُحدّث بعد المراجعة.</div>
      </div>
    </div></div>`;
}

// ===== EVENT HANDLERS =====
function selectProgram(p) { state.program = p; state.name = ""; state.search = ""; render(); }
function selectName(n) { state.name = n; render(); }
function updateSearch(v) { state.search = v; state.name = ""; render(); }
function startExam() { state.page = "exam"; render(); window.scrollTo(0,0); }
function goSection(i) { if(i>=0 && i<SECTIONS.length) { state.section = i; render(); window.scrollTo(0,0); } }
function confirmSubmit() { if(confirm("Are you sure you want to submit?\nهل أنت متأكد من تسليم الامتحان؟")) submitExam(); }

// Make setA global
window.setA = setA;

// Initial render
render();
</script>
</body>
